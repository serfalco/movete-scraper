name: MoVeTe Scraper

on:
  schedule:
    # Jueves 07:00 Argentina (10:00 UTC)
    - cron: "0 10 * * 4"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        run: python main.py
        env:
          # URL del CSV publicado de la planilla de eventos de la comunidad.
          # Es una URL pública (no un secreto): se configura como Variable del
          # repo (Settings > Secrets and variables > Actions > Variables).
          # Si está vacía, la fuente "comunidad" simplemente no corre.
          MOVETE_EVENTOS_CSV: ${{ vars.MOVETE_EVENTOS_CSV }}

      - name: Subir eventos.json como artifact
        uses: actions/upload-artifact@v4
        with:
          name: eventos-json
          path: eventos.json
