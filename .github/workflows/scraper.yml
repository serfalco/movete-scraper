name: MoVeTe Scraper

on:
  schedule:
    # Jueves 07:00 Argentina (10:00 UTC)
    - cron: '0 10 * * 4'
    # Viernes 09:00 Argentina (12:00 UTC)
    - cron: '0 12 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no crea eventos, solo muestra)'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        env:
          WP_URL: https://movete.info
          WP_USER: ${{ secrets.WPUSER }}
          WP_APP_PASSWORD: ${{ secrets.WPAPPPASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py
